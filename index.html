<style>
:root{--bg:#f1f5f9;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--shadow:0 2px 10px rgba(15,23,42,.06)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}button,select,input{font:inherit}button{cursor:pointer}.wrap{max-width:1280px;margin:0 auto;padding:24px}.top{background:white;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;gap:20px;justify-content:space-between;align-items:center}.top h1{margin:0;font-size:22px}.top p{margin:4px 0 0;color:var(--muted);font-size:14px}.top nav{display:flex;gap:8px;flex-wrap:wrap}.top button,.row button{border:1px solid var(--border);background:white;border-radius:12px;padding:9px 12px}.top button.active{background:#0f172a;color:white}.panel{background:white;border:1px solid var(--border);border-radius:24px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}.panel h2{margin:0}.panel small{color:var(--muted)}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:16px}.cards.three{grid-template-columns:repeat(3,1fr)}.card{border:1px solid var(--border);background:white;border-radius:20px;padding:16px;text-align:left;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px}.card b{font-size:24px}.card span{font-size:13px;color:var(--muted)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.info{background:white;border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:var(--shadow)}.info span{display:block;color:var(--muted);font-size:12px}.info strong{display:block;margin-top:6px;font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.primary{background:#0f172a;color:white;border-radius:12px;padding:10px 14px;cursor:pointer}.notice{background:#f8fafc;border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:12px}.sheetgrid,.classgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.sheet,.classcard{border:1px solid var(--border);border-radius:18px;padding:14px;background:#f8fafc}.sheet span{display:inline-block;margin-top:8px;background:white;border-radius:999px;padding:5px 8px;font-size:12px;color:var(--muted)}.progress{display:grid;grid-template-columns:340px 1fr;gap:16px}.progress aside select,.progress input,select{width:auto;border:1px solid var(--border);border-radius:12px;background:white;padding:9px 10px}.progress aside select,.progress input{width:100%}.legend{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.legend span{border-radius:10px;padding:7px;text-align:center;font-size:12px;border:1px solid}.reservoir{display:flex;flex-direction:column;gap:8px}.session{border:1px solid;border-radius:16px;padding:12px}.session.sel{outline:2px solid #0f172a}.session div{display:flex;justify-content:space-between;gap:8px}.session span{background:white;border-radius:999px;padding:3px 8px;font-size:12px}.session small{display:block;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.axis1{background:#dbeafe;border-color:#93c5fd;color:#1e3a8a}.axis2{background:#dcfce7;border-color:#86efac;color:#14532d}.axis3{background:#fef3c7;border-color:#fcd34d;color:#78350f}.timeline{overflow-x:auto;padding-bottom:10px}.weekgrid{display:grid;grid-template-columns:repeat(36,48px);gap:8px;min-width:2000px}.week{position:relative;min-height:96px;border:1px dashed var(--border);border-radius:18px;padding:8px;background:white}.week.busy{border-style:solid;background:#f8fafc}.week.preview{outline:2px solid #64748b}.week.bad{outline:2px solid #ef4444}.week b,.week em{display:block;text-align:center}.week b{font-size:12px;color:#475569}.week em{font-size:10px;color:#94a3b8;font-style:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.vide,.apercu,.suite{display:flex;height:46px;align-items:center;justify-content:center;color:#cbd5e1;font-size:11px}.apercu{background:#f1f5f9;border-radius:12px;color:#64748b}.placed{position:absolute;bottom:4px;left:4px;right:4px;height:28px;border:1px solid;border-radius:12px;z-index:5;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:bold;box-shadow:var(--shadow)}.placed div{display:flex;width:100%;justify-content:space-between;gap:6px}.placed span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.placed button{border:none;background:white;border-radius:999px;font-size:10px}.empty{border:1px dashed var(--border);border-radius:14px;padding:12px;text-align:center;color:var(--muted);background:white}.niv6{background:#dbeafe;border-color:#93c5fd;color:#1e3a8a}.niv5{background:#dcfce7;border-color:#86efac;color:#14532d}.niv4{background:#fef3c7;border-color:#fcd34d;color:#78350f}.niv3{background:#ede9fe;border-color:#c4b5fd;color:#4c1d95}.mini{background:white;border-radius:12px;padding:10px;margin-top:8px}.mini small{display:block;margin-top:4px;color:var(--muted)}.edt{overflow-x:auto}.edtgrid{display:grid;grid-template-columns:80px repeat(5,1fr);gap:8px;min-width:900px}.edtgrid>b{background:#f1f5f9;border-radius:12px;padding:10px;text-align:center}.edtgrid button{min-height:56px;border:1px dashed var(--border);background:white;border-radius:12px;text-align:left;padding:8px}@media(max-width:900px){.top{align-items:flex-start;flex-direction:column}.cards,.cards.three,.stats,.sheetgrid,.classgrid{grid-template-columns:1fr}.progress{grid-template-columns:1fr}}

.planningTable{display:grid;grid-template-columns:80px repeat(5,1fr);gap:8px;min-width:980px;overflow-x:auto;margin:14px 0}
.planningTable>b{background:#f1f5f9;border-radius:12px;padding:10px;text-align:center}
.planningCell{min-height:76px;border:1px dashed var(--border);border-radius:14px;background:#fff;padding:6px}
.emptySmall{display:block;text-align:center;color:#cbd5e1;margin-top:22px}

h3{margin:16px 0 10px}


.edtcell{min-height:64px;border:1px solid;border-radius:12px;padding:8px;text-align:left}
.edtcell strong,.edtcell small{display:block}

.emptycell{border:1px dashed var(--border);background:white;color:#cbd5e1}
.emptySlot{width:100%;height:46px;border:none;background:transparent;color:#cbd5e1;text-align:center}
.cellActions{display:flex;gap:4px;margin-top:6px}
.cellActions button{border:1px solid var(--border);background:white;border-radius:999px;padding:3px 7px;font-size:11px}


.activeslot{border:1px dashed #94a3b8;background:#f8fafc;color:#64748b}
.activeslot .emptySlot{color:#64748b;font-weight:700}


.homeIcon{text-align:center}
.homeIcon .sub{margin:4px 0 18px;color:var(--muted)}
.bigAction{display:flex;justify-content:center;margin:10px 0 22px}
.bigAction button{border:none;background:#0f172a;color:white;border-radius:28px;padding:18px 34px;box-shadow:0 10px 25px rgba(15,23,42,.18);display:flex;flex-direction:column;align-items:center;gap:4px;min-width:240px;font-size:28px}
.bigAction strong{font-size:20px}
.bigAction span{font-size:12px;color:#cbd5e1}
.threeZones{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;text-align:left}
.zone{border-radius:26px;padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:start}
.zone h3{grid-column:1/-1;margin:0 0 4px;text-transform:uppercase;font-size:14px;letter-spacing:.12em}
.zone.before{background:#f3e8ff;border-left:6px solid #7c3aed}
.zone.during{background:#eff6ff;border-left:6px solid #2563eb}
.zone.after{background:#ecfdf5;border-left:6px solid #059669}
.zone .card{box-shadow:none;text-align:center;align-items:center}
.zone .card b{font-size:28px}
@media(max-width:900px){.threeZones{grid-template-columns:1fr}.zone{grid-template-columns:1fr 1fr}}

</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useMemo, useState } = React;

const WEEKS = Array.from({ length: 36 }, (_, i) => i + 1);
const DAYS = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];
const DAY_KEYS = ["lu", "ma", "me", "je", "ve"];
const HOURS = Array.from({ length: 10 }, (_, i) => i + 8);

const KEYS = {
  excel: "eco_excel_core_v1",
  timeline: "eco_progression_v1",
  edt: "eco_edt_v1",
};

const fallbackClasses = [
  { id: "6eA", label: "6e A", level: "6e", cycle: "Cycle 3" },
  { id: "5eB", label: "5e B", level: "5e", cycle: "Cycle 4" },
  { id: "4eC", label: "4e C", level: "4e", cycle: "Cycle 4" },
  { id: "3eD", label: "3e D", level: "3e", cycle: "Cycle 4" },
];

const fallbackSessions = [
  { id: "demo1", title: "Une image qui raconte", duration: 1, classes: ["6eA"], level: "6e", cycle: "Cycle 3", axisIndex: 0, axe: "Représentation", entree: "Narration visuelle", source: "démo" },
  { id: "demo2", title: "Objet transformé", duration: 2, classes: ["6eA"], level: "6e", cycle: "Cycle 3", axisIndex: 1, axe: "Objet", entree: "Détournement", source: "démo" },
  { id: "demo3", title: "La matière devient image", duration: 2, classes: ["5eB", "4eC"], level: "5e", cycle: "Cycle 4", axisIndex: 1, axe: "Matérialité", entree: "Transformation", source: "démo" },
  { id: "demo4", title: "Corps et espace", duration: 1, classes: ["4eC", "3eD"], level: "4e", cycle: "Cycle 4", axisIndex: 2, axe: "Œuvre et espace", entree: "Corps", source: "démo" },
];

const axisClass = ["axis1","axis2","axis3"];
const levelClass = { "6e":"niv6", "5e":"niv5", "4e":"niv4", "3e":"niv3" };

function load(key, fallback) { try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; } catch { return fallback; } }
function save(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }
function getLevel(value) { const text = String(value || "").toLowerCase(); if (text.includes("6e")) return "6e"; if (text.includes("5e")) return "5e"; if (text.includes("4e")) return "4e"; if (text.includes("3e")) return "3e"; return "6e"; }
function getCycle(level) { return level === "6e" ? "Cycle 3" : "Cycle 4"; }
function getAxisIndex(value) { const text = String(value || "").toLowerCase(); if (text.includes("matérial") || text.includes("objet") || text.includes("fabrication")) return 1; if (text.includes("espace") || text.includes("spectateur") || text.includes("œuvre")) return 2; return 0; }
function cleanRows(rows) { return (rows || []).map(row => { const out={}; Object.entries(row||{}).forEach(([k,v])=>{ const key=String(k||"").trim(); if(key && v!==null && v!==undefined && v!=="") out[key]=v; }); return out; }).filter(r=>Object.keys(r).length>0); }
function getOfficialWeek(date) { const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate())); const day = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() + 4 - day); const start = new Date(Date.UTC(d.getUTCFullYear(), 0, 1)); return Math.ceil((((d - start) / 86400000) + 1) / 7); }
function buildWeeks(year = 2026) { const start = new Date(year, 8, 1); const first = new Date(start); const day = first.getDay(); first.setDate(first.getDate() + (day === 0 ? 1 : 1 - day)); return WEEKS.map((week,index)=>{ const monday=new Date(first); monday.setDate(first.getDate()+index*7); const friday=new Date(monday); friday.setDate(monday.getDate()+4); return { week, label:`${monday.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})} → ${friday.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})}`, official:getOfficialWeek(monday) }; }); }
const weeks = buildWeeks();

async function readExcel(file) {
  if (!window.XLSX) throw new Error("XLSX non chargé.");
  const buffer = await file.arrayBuffer();
  const wb = XLSX.read(buffer, { type: "array" });
  const sheets = {};
  wb.SheetNames.forEach(name => { sheets[name] = XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" }); });
  return { fileName: file.name, importedAt: new Date().toISOString(), sheetNames: wb.SheetNames, sheets };
}

function buildCore(excel) {
  if (!excel) return { source:"Données de démonstration", classes:fallbackClasses, sessions:fallbackSessions, stats:{sheets:0,fiches:0,seances:0} };
  const sheets = excel.sheets || {};
  const fiches = cleanRows(sheets.Fiches_de_cours || []);
  const seances = cleanRows(sheets.Fiche_Seances || []);
  const ficheById = {};
  fiches.forEach(f => { if (f.ID_fiche) ficheById[f.ID_fiche] = f; });
  const classMap = new Map();
  fiches.forEach(f => {
    const base = String(f.Classe_cible || f.Niveau || "").trim();
    if (!base) return;
    const id = base.replaceAll(" ","");
    const level = getLevel(base);
    classMap.set(id, { id, label: base, level, cycle: f.Cycle || getCycle(level) });
  });
  const sessions = seances.map((s,index) => {
    const fiche = ficheById[s.ID_fiche] || {};
    const base = String(fiche.Classe_cible || fiche.Niveau || getLevel(fiche.Cycle)).trim();
    const level = getLevel(base || fiche.Cycle);
    const classId = base ? base.replaceAll(" ","") : level;
    const axe = fiche.Axe_programme || fiche.Entree_programme || "Axe à préciser";
    return { id:s.ID_seance || `excel_seance_${index+1}`, title:s.Titre_seance || fiche.Titre_fiche || `Séance ${index+1}`, duration:1, classes:[classId,level], level, cycle:fiche.Cycle || getCycle(level), axisIndex:getAxisIndex(axe), axe, entree:fiche.Entree_programme || axe, ficheTitle:fiche.Titre_fiche || "", objectif:s.Objectif_seance || "", source:"excel" };
  });
  if (classMap.size === 0) fallbackClasses.forEach(c => classMap.set(c.id,c));
  return { source: excel.fileName, classes:Array.from(classMap.values()), sessions:sessions.length ? sessions : fallbackSessions, stats:{sheets:excel.sheetNames?.length||0, fiches:fiches.length, seances:seances.length} };
}

function canPlace(timeline,start,duration,movingId=null) { if(start<1 || start+duration-1>36) return false; for(let i=start;i<start+duration;i++) if(timeline[i] && timeline[i].id!==movingId) return false; return true; }
function clearSession(timeline,id) { const next={...timeline}; Object.keys(next).forEach(w=>{ if(next[w]?.id===id) delete next[w]; }); return next; }
function placeSession(timeline,session,start,movingId=null) { if(!canPlace(timeline,start,session.duration,movingId)) return timeline; const next = movingId ? clearSession(timeline,movingId) : {...timeline}; for(let i=start;i<start+session.duration;i++) next[i] = {...session,startWeek:start,spanIndex:i-start}; return next; }

  const SUIVI_URL = "app_suivi_visuel_v2_lie_fiche.html";
function Header({module,setModule}) {
  const items=[["home","Accueil"],["excel","Fichier noyau"],["progression","Progression"],["organisation","Organisation"],["planning","Planning"],["edt","EDT"]];
  return <header className="top"><div><h1>Écosystème pédagogique</h1><p>Fichier noyau · Progression · Organisation · Planning · EDT</p></div><nav>{items.map(([id,label])=><button key={id} onClick={()=>setModule(id)} className={module===id?"active":""}>{label}</button>)}</nav></header>;
}
function Info({label,value}) { return <div className="info"><span>{label}</span><strong>{value}</strong></div>; }
function Card({icon,title,subtitle,onClick}) { return <button className="card" onClick={onClick}><b>{icon}</b><strong>{title}</strong><span>{subtitle}</span></button>; }
function findCourseNowOrNext(core,timeline,edt,week){
  const events=generatePlanning(core,timeline,edt,week).filter(e=>e.status==="ready"&&e.session);
  return events.length?events[0]:null;
}
function launchCourse(core,timeline,edt,week){
  const event=findCourseNowOrNext(core,timeline,edt,week);
  if(event){openSuivi(event);return;}
  localStorage.setItem("eco_suivi_context",JSON.stringify({classId:null,classLabel:"Classe à choisir",sessionId:null,sessionTitle:null,week,mode:"manuel"}));
  window.location.href=SUIVI_URL;
}

function Home({setModule,core,timeline,edt,week}) { return <><section className="panel homeIcon"><small>Panneau de départ</small><h2>Écosystème pédagogique</h2><p className="sub">Avant · Pendant · Après</p><div className="bigAction"><button onClick={()=>launchCourse(core,timeline,edt,week)}>🎯<strong>Faire cours</strong><span>Ouvrir le suivi avec la classe et la séance prévues</span></button></div><div className="threeZones"><div className="zone before"><h3>Avant</h3><Card icon="⏰" title="EDT" subtitle="Organiser" onClick={()=>setModule("edt")} /><Card icon="📁" title="Fichier noyau" subtitle="Importer" onClick={()=>setModule("excel")} /><Card icon="📦" title="Réservoir" subtitle="Cours / fiches" onClick={()=>setModule("progression")} /></div><div className="zone during"><h3>Pendant</h3><Card icon="🎯" title="Faire cours" subtitle="Lancer le suivi" onClick={()=>launchCourse(core,timeline,edt,week)} /><Card icon="👁️" title="Suivi" subtitle="Classe active" onClick={()=>launchCourse(core,timeline,edt,week)} /><Card icon="📋" title="Planning" subtitle="Semaine" onClick={()=>setModule("planning")} /><Card icon="🧲" title="Tableau" subtitle="Projeter le cours" onClick={()=>{ window.location.href = "app_tableau_virtuel.html"; }} /></div><div className="zone after"><h3>Après</h3><Card icon="📈" title="Progression" subtitle="Année" onClick={()=>setModule("progression")} /><Card icon="🗓️" title="Organisation" subtitle="EDT + planning" onClick={()=>setModule("organisation")} /><Card icon="💬" title="Appréciations" subtitle="À relier" onClick={()=>alert("Module à relier ensuite.")} /></div></div></section><section className="stats"><Info label="Source" value={core.source}/><Info label="Classes" value={core.classes.length}/><Info label="Fiches" value={core.stats.fiches}/><Info label="Séances" value={core.sessions.length}/></section></>; }
function ExcelModule({excel,setExcel,core,setMessage}) { async function handleFile(file){ if(!file) return; try{ const data=await readExcel(file); setExcel(data); save(KEYS.excel,data); setMessage("Fichier noyau importé. Les classes et le réservoir sont alimentés."); }catch(e){ setMessage(e.message||"Import impossible."); }} const required=["README","Listes","Fiches_de_cours","Fiche_Seances","Fiche_Competences","Fiche_References","Competences","Questionnements"]; return <main className="panel"><div className="row"><h2>Fichier Excel noyau</h2><label className="primary">Importer le classeur<input type="file" accept=".xlsx,.xls" hidden onChange={e=>handleFile(e.target.files?.[0])}/></label></div><div className="stats"><Info label="Fichier" value={excel?.fileName||"Aucun"}/><Info label="Onglets" value={excel?.sheetNames?.length||0}/><Info label="Fiches" value={core.stats.fiches}/><Info label="Séances" value={core.stats.seances}/></div><div className="sheetgrid">{required.map(name=><div className="sheet" key={name}><strong>{name}</strong><span>{excel?.sheets?.[name] ? `${excel.sheets[name].length} lignes` : "Non importé"}</span></div>)}</div></main>; }

function Progression({core,selectedClass,setSelectedClass,timeline,setTimeline,message,setMessage}) {
  const [selected,setSelected]=useState(null), [drag,setDrag]=useState(null), [moving,setMoving]=useState(null), [hover,setHover]=useState(null), [search,setSearch]=useState("");
  const current=core.classes.find(c=>c.id===selectedClass)||core.classes[0];
  const placed=useMemo(()=>new Set(Object.values(timeline).map(s=>s.id)),[timeline]);
  const selectedSession=core.sessions.find(s=>s.id===selected), draggedSession=core.sessions.find(s=>s.id===drag);
  const reservoir=core.sessions.filter(s=>(s.classes.includes(selectedClass)||s.classes.includes(current?.level)||s.level===current?.level)&&!placed.has(s.id)&&`${s.title} ${s.axe} ${s.entree} ${s.ficheTitle}`.toLowerCase().includes(search.toLowerCase()));
  const previewOk=draggedSession&&hover!==null?canPlace(timeline,hover,draggedSession.duration,moving):true;
  function put(week,session,movingId=null){ if(!session) return; if(!canPlace(timeline,week,session.duration,movingId)){setMessage("Placement impossible.");return;} setTimeline(prev=>placeSession(prev,session,week,movingId)); setSelected(null); setMessage("Séance placée.");}
  function isPreview(week){ const s=draggedSession||selectedSession; return s&&hover!==null&&week>=hover&&week<hover+s.duration; }
  return <section className="progress"><aside className="panel"><div className="row"><h2>Réservoir</h2><span className="pill">{current?.cycle}</span></div><select value={selectedClass} onChange={e=>setSelectedClass(e.target.value)}>{core.classes.map(c=><option key={c.id} value={c.id}>{c.label} — {c.cycle}</option>)}</select><div className="legend"><span className="axis1">Axe 1</span><span className="axis2">Axe 2</span><span className="axis3">Axe 3</span></div><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filtrer..."/><div className="reservoir">{reservoir.length===0&&<div className="empty">Aucune séance disponible.</div>}{reservoir.map(s=><div key={s.id} draggable onClick={()=>setSelected(s.id)} onDragStart={()=>{setDrag(s.id);setMoving(null)}} onDragEnd={()=>{setDrag(null);setMoving(null);setHover(null)}} className={`session ${axisClass[s.axisIndex||0]} ${selected===s.id?"sel":""}`} title={`${s.title} — ${s.entree}`}><div><strong>{s.title}</strong><span>{s.duration} sem.</span></div><small>{s.ficheTitle||s.entree||s.axe}</small></div>)}</div></aside><main className="panel"><div className="row"><h2>Progression — 36 semaines</h2><button onClick={()=>setTimeline({})}>Tout effacer</button></div>{message&&<div className="notice">{message}</div>}<div className="timeline"><div className="weekgrid">{WEEKS.map(week=>{const info=weeks[week-1], item=timeline[week], start=item&&item.spanIndex===0, cont=item&&item.spanIndex>0, prev=isPreview(week); return <div key={week} onClick={()=>selectedSession&&put(week,selectedSession)} onDragOver={e=>{e.preventDefault();setHover(week)}} onDrop={e=>{e.preventDefault(); if(draggedSession) put(week,draggedSession,moving); setDrag(null);setMoving(null);setHover(null)}} className={`week ${item?"busy":""} ${prev?(previewOk?"preview":"bad"):""}`}><b>S{info.official}</b><em>{info.label}</em>{!item&&!prev&&<span className="vide">vide</span>}{prev&&!item&&<span className="apercu">aperçu</span>}{start&&<div draggable onDragStart={()=>{setDrag(item.id);setMoving(item.id)}} onDragEnd={()=>{setDrag(null);setMoving(null);setHover(null)}} className={`placed ${axisClass[item.axisIndex||0]}`} style={{width:item.duration===1?"calc(100% - 8px)":`calc(${item.duration*100}% + ${(item.duration-1)*8}px - 8px)`}} title={`${item.title} — ${item.entree||item.axe}`}><span>{item.title}</span><button onClick={e=>{e.stopPropagation();setTimeline(prev=>clearSession(prev,item.id))}}>×</button></div>}{cont&&<span className="suite">suite</span>}</div>})}</div></div></main></section>;
}
function WeekSelect({week,setWeek}){return <select value={week} onChange={e=>setWeek(Number(e.target.value))}>{weeks.map(w=><option key={w.week} value={w.week}>S{w.week} — sem. {w.official} — {w.label}</option>)}</select>}
function activeSessionsForClass(core,timeline,week,c){
  return Object.values(timeline).filter(s =>
    s.spanIndex===0 &&
    (s.classes.includes(c.id)||s.classes.includes(c.level)||s.level===c.level) &&
    week>=s.startWeek &&
    week<s.startWeek+s.duration
  );
}
function weekModeFor(week){
  return week % 2 === 1 ? "A" : "B";
}
function edtSlotsForClass(edt,week,classId){
  const mode = weekModeFor(week);
  const slots = [];
  ["fixe", mode].forEach(scope=>{
    const source = edt[scope] || {};
    Object.entries(source).forEach(([key,value])=>{
      if(value===classId){
        const [day,hour] = key.split("-");
        slots.push({day,hour:Number(hour),scope});
      }
    });
  });
  return slots.sort((a,b)=> DAY_KEYS.indexOf(a.day)-DAY_KEYS.indexOf(b.day) || a.hour-b.hour);
}
function generatePlanning(core,timeline,edt,week){
  const events = [];
  core.classes.forEach(c=>{
    const sessions = activeSessionsForClass(core,timeline,week,c);
    const slots = edtSlotsForClass(edt,week,c.id);
    if(sessions.length===0 && slots.length===0) return;
    if(slots.length===0){
      sessions.forEach(session=>{
        events.push({classId:c.id,classLabel:c.label,level:c.level,cycle:c.cycle,session,day:null,hour:null,scope:"sans EDT",status:"no_edt"});
      });
      return;
    }
    if(sessions.length===0){
      slots.forEach(slot=>{
        events.push({classId:c.id,classLabel:c.label,level:c.level,cycle:c.cycle,session:null,...slot,status:"no_session"});
      });
      return;
    }
    slots.forEach((slot,index)=>{
      const session = sessions[Math.min(index,sessions.length-1)];
      events.push({classId:c.id,classLabel:c.label,level:c.level,cycle:c.cycle,session,...slot,status:"ready"});
    });
  });
  return events;
}
function PlanningTable({events}){
  return <div className="planningTable"><div></div>{DAYS.map(d=><b key={d}>{d}</b>)}{HOURS.map(hour=><React.Fragment key={hour}><b>{hour}h</b>{DAY_KEYS.map(day=>{const dayEvents=events.filter(e=>e.day===day&&e.hour===hour);return <div key={`${day}-${hour}`} className="planningCell">{dayEvents.length===0?<span className="emptySmall">—</span>:dayEvents.map((e,i)=><div key={i} className={`event ${levelClass[e.level]||""}`}><strong>{e.classLabel}</strong><span>{e.session?e.session.title:"Séance non placée"}</span><small>{e.scope==="fixe"?"fixe":`sem. ${e.scope}`}</small><button onClick={()=>openSuivi(e)}>Faire cours</button></div>)}</div>})}</React.Fragment>)}</div>;
}
function PlanningCards({core,timeline,edt,week}){
  const events = generatePlanning(core,timeline,edt,week);
  function classEvents(c){return events.filter(e=>e.classId===c.id)}
  return <div className="classgrid">{core.classes.map(c=>{const ev=classEvents(c); return <div key={c.id} className={`classcard ${levelClass[c.level]||""}`}><div className="row"><h3>{c.label}</h3><small>{c.cycle}</small></div>{ev.length===0?<div className="empty">Rien cette semaine.</div>:ev.map((e,i)=><div key={i} className="mini"><strong>{e.day?`${labelDay(e.day)} ${e.hour}h`:"Sans créneau EDT"}</strong><small>{e.session?e.session.title:"Séance non placée dans la progression"}</small></div>)}</div>})}</div>
}
function labelDay(day){return {lu:"Lundi",ma:"Mardi",me:"Mercredi",je:"Jeudi",ve:"Vendredi"}[day]||day}
function openSuivi(event){
  const payload = {
    classId:event.classId,
    classLabel:event.classLabel,
    level:event.level,
    cycle:event.cycle,
    sessionId:event.session?.id || null,
    sessionTitle:event.session?.title || null,
    week:window.__currentPlanningWeek || 1,
    day:event.day,
    hour:event.hour,
    scope:event.scope
  };
  localStorage.setItem("eco_suivi_context", JSON.stringify(payload));
  window.location.href = SUIVI_URL;
}
function Planning({core,timeline,edt,week,setWeek}){window.__currentPlanningWeek=week; const events=generatePlanning(core,timeline,edt,week); return <main className="panel"><div className="row"><h2>Planning automatique</h2><WeekSelect week={week} setWeek={setWeek}/></div><div className="notice">Semaine {week} · alternance {weekModeFor(week)} · {events.length} créneau(x) généré(s)</div><PlanningTable events={events}/><h3>Vue par classe</h3><PlanningCards core={core} timeline={timeline} edt={edt} week={week}/></main>}
function Organisation({setModule,core,timeline,edt,week,setWeek}){const events=generatePlanning(core,timeline,edt,week); return <main className="panel"><div className="row"><h2>Organisation</h2><WeekSelect week={week} setWeek={setWeek}/></div><div className="cards three"><Card title="Fichier Excel noyau" subtitle="Importer / vérifier" icon="📁" onClick={()=>setModule("excel")}/><Card title="EDT" subtitle="Heures fixes · A · B" icon="⏰" onClick={()=>setModule("edt")}/><Card title="Planning automatique" subtitle={`${events.length} créneau(x)`} icon="📅" onClick={()=>setModule("planning")}/></div><PlanningCards core={core} timeline={timeline} edt={edt} week={week}/></main>}
function Edt({core,selectedClass,setSelectedClass,edt,setEdt}){const [mode,setMode]=useState("fixe"); const current=core.classes.find(c=>c.id===selectedClass)||core.classes[0]; function activeSlots(data){const keys=new Set();["fixe","A","B"].forEach(scope=>Object.keys(data[scope]||{}).forEach(k=>keys.add(k)));Object.keys(data.structure||{}).forEach(k=>keys.add(k));return keys} function place(day,hour){const key=`${day}-${hour}`;setEdt(prev=>{const next={...prev,structure:{...(prev.structure||{}),[key]:true},[mode]:{...(prev[mode]||{}),[key]:selectedClass}};return next})} function remove(day,hour){const key=`${day}-${hour}`;setEdt(prev=>{const next={...prev,structure:{...(prev.structure||{})},[mode]:{...(prev[mode]||{})}};delete next[mode][key];if(!next.fixe?.[key]&&!next.A?.[key]&&!next.B?.[key])delete next.structure[key];return next})} function clearScope(){setEdt(prev=>{const next={...prev,[mode]:{}};const structure={};["fixe","A","B"].forEach(scope=>Object.keys(next[scope]||{}).forEach(k=>structure[k]=true));next.structure=structure;return next})} const slots=activeSlots(edt); return <main className="panel"><div className="row"><h2>EDT</h2><div><select value={selectedClass} onChange={e=>setSelectedClass(e.target.value)}>{core.classes.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select><select value={mode} onChange={e=>setMode(e.target.value)}><option value="fixe">Heure fixe</option><option value="A">Semaine A</option><option value="B">Semaine B</option></select><button onClick={clearScope}>Vider cette grille</button></div></div><div className="notice">Classe à placer : <strong>{current?.label}</strong> · Grille active : <strong>{mode==="fixe"?"Heure fixe":`Semaine ${mode}`}</strong> · Créneaux communs actifs : <strong>{slots.size}</strong></div><div className="edt"><div className="edtgrid"><div></div>{DAYS.map(d=><b key={d}>{d}</b>)}{HOURS.map(hour=><React.Fragment key={hour}><b>{hour}h</b>{DAY_KEYS.map(day=>{const key=`${day}-${hour}`, id=edt[mode]?.[key], found=core.classes.find(c=>c.id===id), active=slots.has(key); return <div key={key} className={`edtcell ${found?levelClass[found.level]:(active?"activeslot":"emptycell")}`}>{found?<><strong>{found.label}</strong><small>{mode==="fixe"?"fixe":`semaine ${mode}`}</small><div className="cellActions"><button onClick={()=>place(day,hour)}>Remplacer</button><button onClick={()=>remove(day,hour)}>×</button></div></>:<button className="emptySlot" onClick={()=>place(day,hour)}>{active?"créneau actif":"vide"}</button>}</div>})}</React.Fragment>)}</div></div></main>}
function App(){const getStartModule=()=>{const h=window.location.hash.replace("#","");return h||"home"};const [module,setModule]=useState(getStartModule()),[excel,setExcel]=useState(()=>load(KEYS.excel,null)),[timeline,setTimeline]=useState(()=>load(KEYS.timeline,{})),[edt,setEdt]=useState(()=>load(KEYS.edt,{fixe:{},A:{},B:{},structure:{}})),[week,setWeek]=useState(1),[selectedClass,setSelectedClass]=useState("6eA"),[message,setMessage]=useState(""); const core=useMemo(()=>buildCore(excel),[excel]); useEffect(()=>save(KEYS.timeline,timeline),[timeline]); useEffect(()=>save(KEYS.edt,edt),[edt]); useEffect(()=>{if(window.location.hash.replace("#","")!==module)window.location.hash=module},[module]); useEffect(()=>{const onHash=()=>setModule(getStartModule());window.addEventListener("hashchange",onHash);return()=>window.removeEventListener("hashchange",onHash)},[]); useEffect(()=>{if(!core.classes.some(c=>c.id===selectedClass)&&core.classes[0])setSelectedClass(core.classes[0].id)},[core.classes,selectedClass]); return <div><Header module={module} setModule={setModule}/><div className="wrap">{message&&<div className="notice">{message}</div>}{module==="home"&&<Home setModule={setModule} core={core} timeline={timeline} edt={edt} week={week}/>} {module==="excel"&&<ExcelModule excel={excel} setExcel={setExcel} core={core} setMessage={setMessage}/>} {module==="progression"&&<Progression core={core} selectedClass={selectedClass} setSelectedClass={setSelectedClass} timeline={timeline} setTimeline={setTimeline} message={message} setMessage={setMessage}/>} {module==="organisation"&&<Organisation setModule={setModule} core={core} timeline={timeline} edt={edt} week={week} setWeek={setWeek}/>} {module==="planning"&&<Planning core={core} timeline={timeline} edt={edt} week={week} setWeek={setWeek}/>} {module==="edt"&&<Edt core={core} selectedClass={selectedClass} setSelectedClass={setSelectedClass} edt={edt} setEdt={setEdt}/>}</div></div>}
window.App = App;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
