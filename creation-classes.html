<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Création de classes</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#d7deea;--accent:#111827;--soft:#eef2ff}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:18px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
    .wrap{max-width:1400px;margin:0 auto;padding:20px 18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    h1{margin:0;font-size:26px}.muted{color:var(--muted)}
    .layout{display:grid;grid-template-columns:310px 1fr;gap:16px;margin-top:18px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 6px 18px rgba(0,0,0,.05)} .pad{padding:16px}
    button,.btn{border:none;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
    .btn-dark{background:#111827;color:#fff}.btn-light{background:var(--soft);color:#1d4ed8}.btn-gray{background:#e5e7eb;color:#374151}.btn-red{background:#fee2e2;color:#991b1b}
    input,select,textarea{width:100%;padding:10px 12px;border:1px solid #cfd8e3;border-radius:12px;font-size:14px;background:#fff}
    .list{display:grid;gap:8px}.class-item{display:flex;gap:8px}.class-item button:first-child{flex:1;text-align:left}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1.2fr .7fr 1fr;gap:12px}
    .student{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff;display:grid;gap:10px}.student + .student{margin-top:12px}
    .ebeps{display:flex;flex-wrap:wrap;gap:8px}.ebep{padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:13px;cursor:pointer}.ebep.active{background:#111827;color:#fff;border-color:#111827}
    .topline{display:flex;justify-content:space-between;align-items:center;gap:8px}.actions{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:12px;color:var(--muted)}
    @media (max-width:1100px){.layout,.grid2,.grid3{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div class="wrap top" style="padding:0 18px;max-width:1400px;">
      <div>
        <h1>Création de classes</h1>
        <div class="muted">Créer la fiche classe et la fiche élève pour alimenter les autres applications.</div>
      </div>
      <div class="actions">
        <a class="btn btn-light" href="index.html">← Tableau de bord</a>
        <a class="btn btn-light" href="suivi-classe.html">Suivi de classe</a>
      </div>
    </div>
  </header>
  <main class="wrap">
    <div class="layout">
      <aside class="card"><div class="pad">
        <div class="topline"><strong>Classes</strong><button class="btn-dark" id="addClassBtn">+ Classe</button></div>
        <div id="classList" class="list" style="margin-top:12px"></div>
        <div class="actions" style="margin-top:14px">
          <button class="btn-light" id="exportBtn">Exporter JSON</button>
          <label class="btn-light">Importer JSON<input id="importInput" type="file" accept="application/json" hidden></label>
        </div>
      </div></aside>

      <section class="card"><div class="pad">
        <div class="grid2">
          <div>
            <label>Nom de la classe</label>
            <input id="className" placeholder="Ex. 5e B">
          </div>
          <div>
            <label>Professeur / repère</label>
            <input id="classTeacher" placeholder="Ex. Arts plastiques">
          </div>
        </div>
        <div class="actions" style="margin-top:12px">
          <button class="btn-dark" id="saveClassBtn">Enregistrer la classe</button>
          <button class="btn-gray" id="addStudentBtn">+ Élève</button>
        </div>
        <p class="small" style="margin-top:10px">Les données sont gardées en mémoire dans le navigateur et peuvent être exportées en JSON.</p>

        <div id="studentsWrap" style="margin-top:18px"></div>
      </div></section>
    </div>
  </main>

<script>
const STORAGE_KEY='outil-classes-v1';
const EBEP_OPTIONS=['ULIS','Dys','PAP','PAI','PPRE','FLE','SEGPA-Inclus'];
const uid=()=>Math.random().toString(36).slice(2,10);
function newStudent(){return {id:uid(),prenom:'',nom:'',table:'',ebeps:[],notes:''};}
function newClass(name='Nouvelle classe'){return {id:uid(),name,teacher:'',students:[newStudent()]};}
let state=load()||{classes:[newClass('Classe 1')],activeClassId:null};
if(!state.activeClassId) state.activeClassId=state.classes[0].id;
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):null;}catch{return null;}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function active(){return state.classes.find(c=>c.id===state.activeClassId);} 
function renderClassList(){
  const box=document.getElementById('classList'); box.innerHTML='';
  state.classes.forEach(c=>{
    const row=document.createElement('div'); row.className='class-item';
    const open=document.createElement('button'); open.className=c.id===state.activeClassId?'btn-dark':'btn-light'; open.textContent=c.name||'Classe sans nom';
    open.onclick=()=>{state.activeClassId=c.id; render();};
    const del=document.createElement('button'); del.className='btn-red'; del.textContent='✕';
    del.onclick=()=>{ if(state.classes.length===1) return; state.classes=state.classes.filter(x=>x.id!==c.id); if(state.activeClassId===c.id) state.activeClassId=state.classes[0].id; save(); render(); };
    row.append(open,del); box.appendChild(row);
  });
}
function renderStudents(){
  const cls=active(); const wrap=document.getElementById('studentsWrap'); wrap.innerHTML='';
  cls.students.forEach((s,idx)=>{
    const card=document.createElement('div'); card.className='student';
    const top=document.createElement('div'); top.className='topline'; top.innerHTML=`<strong>Élève ${idx+1}</strong>`;
    const del=document.createElement('button'); del.className='btn-red'; del.textContent='Supprimer'; del.onclick=()=>{cls.students=cls.students.filter(x=>x.id!==s.id); if(!cls.students.length) cls.students.push(newStudent()); save(); render();};
    top.appendChild(del); card.appendChild(top);
    const row1=document.createElement('div'); row1.className='grid3';
    row1.innerHTML=`<div><label>Prénom</label><input value="${escapeHtml(s.prenom)}" data-field="prenom"></div><div><label>Nom</label><input value="${escapeHtml(s.nom)}" data-field="nom"></div><div><label>Numéro de table</label><input value="${escapeHtml(s.table)}" data-field="table"></div>`;
    card.appendChild(row1);
    const eb=document.createElement('div'); eb.innerHTML='<label>EBEP / besoins particuliers</label>';
    const ebWrap=document.createElement('div'); ebWrap.className='ebeps';
    EBEP_OPTIONS.forEach(opt=>{ const b=document.createElement('button'); b.className='ebep'+(s.ebeps.includes(opt)?' active':''); b.textContent=opt; b.onclick=()=>{ if(s.ebeps.includes(opt)) s.ebeps=s.ebeps.filter(x=>x!==opt); else s.ebeps.push(opt); save(); renderStudents();}; ebWrap.appendChild(b); });
    eb.appendChild(ebWrap); card.appendChild(eb);
    const notes=document.createElement('div'); notes.innerHTML=`<label>Notes / repères</label><textarea rows="2">${escapeHtml(s.notes||'')}</textarea>`; card.appendChild(notes);
    [...row1.querySelectorAll('input')].forEach(inp=>inp.oninput=e=>{s[inp.dataset.field]=e.target.value; save(); syncClassName();});
    notes.querySelector('textarea').oninput=e=>{s.notes=e.target.value; save();};
    wrap.appendChild(card);
  });
}
function syncClassName(){ document.getElementById('className').value=active().name||''; document.getElementById('classTeacher').value=active().teacher||''; renderClassList(); }
function render(){ const cls=active(); document.getElementById('className').value=cls.name||''; document.getElementById('classTeacher').value=cls.teacher||''; renderClassList(); renderStudents(); save(); }
function escapeHtml(str){return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.getElementById('addClassBtn').onclick=()=>{const c=newClass(`Classe ${state.classes.length+1}`); state.classes.push(c); state.activeClassId=c.id; save(); render();};
document.getElementById('saveClassBtn').onclick=()=>{ const cls=active(); cls.name=document.getElementById('className').value.trim()||'Classe sans nom'; cls.teacher=document.getElementById('classTeacher').value.trim(); save(); render(); };
document.getElementById('addStudentBtn').onclick=()=>{ active().students.push(newStudent()); save(); render(); };
document.getElementById('exportBtn').onclick=()=>{ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='classes-eleves.json'; a.click(); URL.revokeObjectURL(a.href); };
document.getElementById('importInput').onchange=e=>{ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ try{ const data=JSON.parse(reader.result); if(data && Array.isArray(data.classes)){ state=data; if(!state.activeClassId && state.classes[0]) state.activeClassId=state.classes[0].id; save(); render(); alert('Import réussi.'); } else alert('Fichier non valide.'); } catch { alert('Import impossible.'); } }; reader.readAsText(file); };
render();
</script>
</body>
</html>
