<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Suivi terrain simple v3</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#eef2f7;--line:#d9e2ec;--muted:#64748b;--gris:#94a3b8;--noir:#111827;--rouge:#dc2626;--jaune:#facc15;--vert:#16a34a;--bleu:#2563eb;--violet:#8b5cf6}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#111827}header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:12px}h1{margin:0;font-size:21px}.sub{font-size:12px;color:var(--muted);margin-top:4px}.wrap{max-width:1500px;margin:auto;padding:10px}.top{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}button,.fake{border:0;border-radius:15px;padding:10px 12px;font-weight:800;cursor:pointer}.top button,.top label{min-height:56px;font-size:15px}.btn{background:#111827;color:white}.btn2{background:#e0e7ff;color:#1e3a8a}.btnG{background:#dcfce7;color:#166534}.btnR{background:#fee2e2;color:#991b1b}.btnX{background:#e5e7eb;color:#374151}.btnV{background:#f3e8ff;color:#6b21a8}.btnExport{background:#111827;color:white;font-size:16px;min-height:52px;padding:12px 18px;box-shadow:0 10px 24px rgba(15,23,42,.20)}.hidden{display:none!important}.panel{background:white;border:1px solid var(--line);border-radius:20px;padding:12px;margin-bottom:10px;box-shadow:0 8px 22px rgba(15,23,42,.07)}.barTop{position:sticky;top:58px;z-index:9}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}select{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff;font-size:15px}.grow{flex:1;min-width:180px}.small{font-size:12px}.muted{color:var(--muted)}.legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.classGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px}.classBtn{background:white;border:2px solid var(--line);color:#111827;min-height:54px}.classBtn.active{background:#111827;color:white}.tables{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}.table{background:white;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 8px 22px rgba(15,23,42,.07)}.tableHead{background:#111827;color:white;padding:10px 12px;font-weight:900;display:flex;justify-content:space-between}.students{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:8px;padding:10px}.student{border:1px solid var(--line);border-radius:17px;background:white;min-height:116px;padding:9px}.student.absent{opacity:.60;background:#e5e7eb}.name{font-weight:900;font-size:13px;line-height:1.15;min-height:32px}.meta{font-size:11px;color:var(--muted);min-height:16px;margin-top:3px}.colorBar{height:9px;border-radius:999px;margin:8px 0;background:var(--gris)}.badges{display:flex;gap:4px;flex-wrap:wrap;min-height:20px}.badge{font-size:10px;font-weight:900;border-radius:999px;padding:3px 6px}.bAbs{background:#111827;color:white}.bInc{background:#fee2e2;color:#991b1b}.bTr{background:#dcfce7;color:#166534}.bRe{background:#f3e8ff;color:#6b21a8}.bEb{background:#e0f2fe;color:#075985}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:7px}.actions button{border-radius:10px;padding:6px 2px;font-size:11px}.tablePick{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:7px}.tablePick button{border-radius:9px;padding:5px 0;font-size:10px;background:#eef2ff;color:#1e3a8a}.tablePick button.active{background:#111827;color:#fff}.tablePickTitle{font-size:10px;color:var(--muted);font-weight:800;margin-top:7px}.saveDot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#16a34a;margin-right:5px}
@media(max-width:720px){.top{grid-template-columns:1fr}.wrap{padding:8px}.tables{grid-template-columns:1fr}.students{grid-template-columns:repeat(2,1fr)}.barTop{top:56px}.panel{padding:10px;border-radius:18px}.actions button{font-size:10px}}
</style>
</head>
<body>
<header><div class="wrap" style="padding:0"><h1>Suivi terrain simple v3</h1><div class="sub">Importer le noyau · choisir la classe · suivre en cours · placement par table en clic.</div></div></header>
<div class="wrap">
  <div class="top">
    <label class="fake btn2" style="display:flex;align-items:center;justify-content:center;text-align:center">1. Importer le fichier noyau<input id="excelInput" type="file" accept=".xlsx,.xls" class="hidden"></label>
    <button class="btn2" onclick="showStep('classes')">2. Choix des classes</button>
    <button class="btn" onclick="showStep('suivi')">3. Suivi en classe</button>
  </div>
  <section class="panel barTop"><div class="row"><div><strong>Classe :</strong> <span id="activeClassLabel">aucune</span></div><div class="grow"><div class="small muted">Compétence à évaluer</div><select id="skillSelect" class="grow"></select></div><button class="btnExport" onclick="exportJson()">⬇ Exporter le suivi JSON</button><label class="fake btnX">Importer JSON<input id="jsonInput" type="file" accept="application/json" class="hidden"></label><span class="small muted"><span class="saveDot"></span><span id="saveStatus">sauvegarde automatique</span></span></div><div class="legend"><span class="pill" style="background:var(--gris)">Gris : non évalué</span><span class="pill" style="background:var(--noir);color:white">Noir</span><span class="pill" style="background:var(--rouge);color:white">Rouge</span><span class="pill" style="background:var(--jaune)">Jaune</span><span class="pill" style="background:var(--vert);color:white">Vert</span><span class="pill" style="background:var(--bleu);color:white">Bleu</span></div><div class="small muted" id="statusText" style="margin-top:8px">Importe d’abord le classeur noyau ou un suivi JSON.</div></section>
  <section id="step-classes" class="panel hidden"><h2 style="margin-top:0">Choisir une classe</h2><div id="classGrid" class="classGrid"></div></section>
  <section id="step-suivi"><div id="tablesMount" class="tables"></div></section>
</div>
<script>
const STORAGE_KEY='suivi_terrain_simple_v1';
const LEVELS=['gris','noir','rouge','jaune','vert','bleu'];
const COLORS={gris:'#94a3b8',noir:'#111827',rouge:'#dc2626',jaune:'#facc15',vert:'#16a34a',bleu:'#2563eb'};
const DEFAULT_SKILLS=[{id:'global',label:'Positionnement général'},{id:'creer',label:'Créer / réaliser'},{id:'reflechir',label:'Questionner / réfléchir'},{id:'mettre_oeuvre',label:'Mettre en œuvre'},{id:'expliquer',label:'Expliquer'},{id:'connaitre',label:'Connaître'}];
let state=load()||{classes:{},activeClass:null,skills:DEFAULT_SKILLS,step:'classes',lastImportName:'',hasUnexportedChanges:false};
if(typeof state.hasUnexportedChanges !== 'boolean') state.hasUnexportedChanges=false;
function uid(){return Math.random().toString(36).slice(2,10)}
function norm(v){return String(v??'').trim()}
function normalizeKey(s){return norm(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}
function save(markDirty=true){if(markDirty) state.hasUnexportedChanges=true;localStorage.setItem(STORAGE_KEY,JSON.stringify(state));const extra=state.hasUnexportedChanges?' · export conseillé':'';document.getElementById('saveStatus').textContent='sauvegardé '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+extra;}
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')}catch(e){return null}}
function getActive(){return state.activeClass?state.classes[state.activeClass]:null}
function showStep(step){state.step=step;render();save()}
function activeSkillId(){return document.getElementById('skillSelect').value||'global'}
function nextLevel(l){let i=LEVELS.indexOf(l||'gris');return LEVELS[(i+1)%LEVELS.length]}
function cycleEval(id){const cls=getActive(); if(!cls)return; const s=cls.students.find(x=>x.id===id); if(!s||s.absent)return; let skill=activeSkillId(); s.evals=s.evals||{}; s.evals[skill]=nextLevel(s.evals[skill]||'gris');render();save()}
function toggle(id,action){const cls=getActive(); if(!cls)return; const s=cls.students.find(x=>x.id===id); if(!s)return; if(action==='absent')s.absent=!s.absent; if(action==='incident')s.incident=(s.incident||0)+1; if(action==='travail')s.travail=!s.travail; if(action==='reflexion')s.reflexion=!s.reflexion; render();save()}
function setStudentTable(id,num){const cls=getActive(); if(!cls)return; const s=cls.students.find(x=>x.id===id); if(!s)return; s.table='Table '+num; render(); save();}
function tableLabel(v){let t=norm(v); if(!t)return'Non placés'; let m=t.match(/^(?:table\s*)?t?\s*(\d+)$/i); return m?'Table '+m[1]:t}
function makeStudent(o){let name=norm(o.nom_complet||o.nomComplet||[o.nom,o.prenom].filter(Boolean).join(' ')); return {id:uid(),name:name||'Élève',table:tableLabel(o.table),groupe:norm(o.groupe),ebep:norm(o.ebep),precisions:norm(o.precisions),absent:false,incident:0,travail:false,reflexion:false,evals:{}}}
function parseWorkbook(wb,fileName){let ws=wb.Sheets['Eleves']||wb.Sheets['Élèves']; if(!ws)throw new Error('Onglet Eleves introuvable'); let rows=XLSX.utils.sheet_to_json(ws,{defval:''}); let classes={}; rows.forEach(row=>{let o={}; Object.keys(row).forEach(k=>o[normalizeKey(k)]=row[k]); let active=norm(o.actif||o.active||'oui').toLowerCase(); if(['non','no','0'].includes(active))return; let classe=norm(o.classe); if(!classe)return; if(!classes[classe])classes[classe]={name:classe,students:[]}; let s=makeStudent(o); if(s.name&&s.name!=='Élève')classes[classe].students.push(s)}); if(!Object.keys(classes).length)throw new Error('Aucune classe trouvée dans Eleves'); Object.keys(classes).forEach(k=>{if(state.classes[k]){let old=state.classes[k]; let oldByName=new Map(old.students.map(s=>[normalizeKey(s.name),s])); classes[k].students=classes[k].students.map(ns=>{let os=oldByName.get(normalizeKey(ns.name)); return os?{...ns,...os,table:ns.table||os.table,ebep:ns.ebep||os.ebep,precisions:ns.precisions||os.precisions}:ns})} state.classes[k]=classes[k]}); state.lastImportName=fileName||''; if(!state.activeClass)state.activeClass=Object.keys(classes)[0]}
document.getElementById('excelInput').addEventListener('change',async e=>{let file=e.target.files[0]; if(!file)return; try{let buf=await file.arrayBuffer(); let wb=XLSX.read(buf,{type:'array'}); parseWorkbook(wb,file.name); state.step='classes'; render();save();alert('Noyau importé. Choisis maintenant la classe.')}catch(err){alert('Import impossible : '+err.message)} e.target.value=''});
document.getElementById('jsonInput').addEventListener('change',async e=>{let file=e.target.files[0]; if(!file)return; try{let data=JSON.parse(await file.text()); if(data.app!=='suivi_terrain_simple')throw new Error('fichier non reconnu'); state=data.state; render();save();alert('Suivi JSON restauré.')}catch(err){alert('Import JSON impossible : '+err.message)} e.target.value=''});
function safeFileName(s){return String(s||'classe').trim().replace(/[^a-zA-Z0-9_-]+/g,'_').replace(/^_+|_+$/g,'')||'classe'}
function exportJson(){const exportedAt=new Date().toISOString();let exportState=JSON.parse(JSON.stringify(state));exportState.hasUnexportedChanges=false;let data={app:'suivi_terrain_simple',version:'v3-table-rapide',type:'suivi_observable_heure',classe:state.activeClass||'',exportedAt,state:exportState}; let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); let a=document.createElement('a'); let d=new Date(); const date=d.toISOString().slice(0,10); const heure=d.toTimeString().slice(0,5).replace(':','h'); a.href=URL.createObjectURL(blob); a.download='suivi_'+safeFileName(state.activeClass)+'_'+date+'_'+heure+'.json'; a.click(); URL.revokeObjectURL(a.href); state.hasUnexportedChanges=false; save(false)}
function renderSkills(){let sel=document.getElementById('skillSelect'); let val=sel.value||'global'; sel.innerHTML=state.skills.map(s=>`<option value="${s.id}">${esc(s.label)}</option>`).join(''); sel.value=state.skills.some(s=>s.id===val)?val:'global'}
document.getElementById('skillSelect').addEventListener('change',()=>{render();save()});
function renderClasses(){let mount=document.getElementById('classGrid'); let names=Object.keys(state.classes).sort((a,b)=>a.localeCompare(b,'fr',{numeric:true})); mount.innerHTML=names.length?names.map(n=>`<button class="classBtn ${state.activeClass===n?'active':''}" onclick="state.activeClass='${attr(n)}';state.step='suivi';render();save()"><strong>${esc(n)}</strong><br><span class="small muted">${state.classes[n].students.length} élèves</span></button>`).join(''):'<p class="muted">Aucune classe importée.</p>'}
function grouped(cls){let g={}; cls.students.forEach(s=>{let t=s.table||'Non placés'; if(!g[t])g[t]=[]; g[t].push(s)}); return Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0],'fr',{numeric:true}))}
function renderSuivi(){let cls=getActive(), mount=document.getElementById('tablesMount'); if(!cls){mount.innerHTML='<div class="panel"><strong>Aucune classe sélectionnée.</strong><div class="small muted">Importe le noyau puis choisis une classe.</div></div>';return} let skill=activeSkillId(); mount.innerHTML=grouped(cls).map(([t,students])=>`<div class="table"><div class="tableHead"><span>${esc(t)}</span><small>${students.length} élèves</small></div><div class="students">${students.map(s=>card(s,skill)).join('')}</div></div>`).join('')}
function currentTableNumber(table){let m=String(table||'').match(/(\d+)/); return m?m[1]:''}
function tableButtons(s){const current=currentTableNumber(s.table);let nums=[1,2,3,4,5];return `<div class="tablePickTitle">Table rapide</div><div class="tablePick" onclick="event.stopPropagation()">${nums.map(n=>`<button class="${String(n)===String(current)?'active':''}" onclick="setStudentTable('${s.id}',${n})">${n}</button>`).join('')}</div>`}
function card(s,skill){let lvl=s.evals?.[skill]||'gris'; return `<div class="student ${s.absent?'absent':''}" onclick="cycleEval('${s.id}')"><div class="name">${esc(s.name)}</div><div class="meta">${esc(s.table||'Non placé')}${s.ebep?' · '+esc(s.ebep):''}${s.precisions?' · '+esc(s.precisions):''}</div><div class="colorBar" style="background:${COLORS[lvl]}"></div><div class="badges">${s.absent?'<span class="badge bAbs">Absent</span>':''}${s.incident?'<span class="badge bInc">Incident '+s.incident+'</span>':''}${s.travail?'<span class="badge bTr">Au travail</span>':''}${s.reflexion?'<span class="badge bRe">Réflexion</span>':''}${s.ebep?'<span class="badge bEb">EBEP</span>':''}</div>${tableButtons(s)}<div class="actions" onclick="event.stopPropagation()"><button class="btnX" onclick="toggle('${s.id}','absent')">Ab</button><button class="btnR" onclick="toggle('${s.id}','incident')">In</button><button class="btnG" onclick="toggle('${s.id}','travail')">Tr</button><button class="btnV" onclick="toggle('${s.id}','reflexion')">Ré</button></div></div>`}
function render(){renderSkills(); document.getElementById('activeClassLabel').textContent=state.activeClass||'aucune'; document.getElementById('step-classes').classList.toggle('hidden',state.step!=='classes'); renderClasses(); renderSuivi(); let cls=getActive(), total=cls?cls.students.length:0, ev=cls?cls.students.filter(s=>(s.evals||{})[activeSkillId()]&&s.evals[activeSkillId()]!=='gris').length:0; document.getElementById('statusText').textContent=cls?`${cls.name} · ${total} élèves · ${ev} évalués pour la compétence choisie · noyau : ${state.lastImportName||'non renseigné'}`:'Importe d’abord le classeur noyau ou un suivi JSON.'}
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function attr(s){return esc(s).replaceAll('`','&#096;')}
window.addEventListener('beforeunload', function(e){if(state.hasUnexportedChanges){e.preventDefault();e.returnValue='Tu as des modifications non exportees en JSON.';return e.returnValue;}});
render();
</script>
</body>
</html>
