<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Synthèse élèves v1</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#eef2f7;--line:#d9e2ec;--muted:#64748b;--gris:#94a3b8;--noir:#111827;--rouge:#dc2626;--jaune:#facc15;--vert:#16a34a;--bleu:#2563eb;--violet:#8b5cf6;--orange:#f97316}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#111827}header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:12px}h1{margin:0;font-size:21px}.sub{font-size:12px;color:var(--muted);margin-top:4px}.wrap{max-width:1500px;margin:auto;padding:10px}.top{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}button,.fake{border:0;border-radius:15px;padding:10px 12px;font-weight:800;cursor:pointer}.top button,.top label{min-height:56px;font-size:15px}.btn{background:#111827;color:white}.btn2{background:#e0e7ff;color:#1e3a8a}.btnG{background:#dcfce7;color:#166534}.btnR{background:#fee2e2;color:#991b1b}.btnX{background:#e5e7eb;color:#374151}.btnV{background:#f3e8ff;color:#6b21a8}.btnO{background:#ffedd5;color:#9a3412}.hidden{display:none!important}.panel{background:white;border:1px solid var(--line);border-radius:20px;padding:12px;margin-bottom:10px;box-shadow:0 8px 22px rgba(15,23,42,.07)}.barTop{position:sticky;top:58px;z-index:9}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}select,input[type="search"]{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff;font-size:15px}.grow{flex:1;min-width:180px}.small{font-size:12px}.muted{color:var(--muted)}.legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.classGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px}.classBtn{background:white;border:2px solid var(--line);color:#111827;min-height:54px}.classBtn.active{background:#111827;color:white}.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.kpi{background:white;border:1px solid var(--line);border-radius:18px;padding:12px}.kpi strong{font-size:26px}.mainGrid{display:grid;grid-template-columns:minmax(320px,420px) 1fr;gap:10px}.studentList{display:grid;gap:8px}.studentBtn{text-align:left;background:white;border:2px solid var(--line);color:#111827;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.studentBtn.active{border-color:#111827}.dot{width:18px;height:18px;border-radius:999px;background:var(--gris);display:inline-block}.name{font-weight:900}.meta{font-size:12px;color:var(--muted);margin-top:3px}.bars{display:grid;gap:8px}.barLine{display:grid;grid-template-columns:130px 1fr 45px;gap:8px;align-items:center}.barTrack{height:16px;background:#e5e7eb;border-radius:999px;overflow:hidden}.barFill{height:100%;background:#111827;border-radius:999px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.card{border:1px solid var(--line);border-radius:18px;padding:12px;background:#fff}.levelChip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 9px;background:#f8fafc;border:1px solid var(--line);font-weight:900}.textBox{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:12px;line-height:1.45}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:8px;text-align:left;font-size:13px}.table th{color:#475569}.warn{background:#fff7ed;border-color:#fed7aa}.ok{background:#f0fdf4;border-color:#bbf7d0}.bad{background:#fef2f2;border-color:#fecaca}.printOnly{display:none}
@media(max-width:900px){.top{grid-template-columns:1fr}.mainGrid{grid-template-columns:1fr}.wrap{padding:8px}.barTop{top:56px}}
@media print{header,.top,.barTop,.noPrint{display:none!important}body{background:#fff}.wrap{max-width:none}.panel,.card,.kpi{box-shadow:none}.mainGrid{display:block}.studentList{display:none}.printOnly{display:block}}
</style>
</head>
<body>
<header><div class="wrap" style="padding:0"><h1>Synthèse élèves v1</h1><div class="sub">Importer le noyau · importer les JSON de séance · lire les tendances, progrès et difficultés.</div></div></header>
<div class="wrap">
  <div class="top">
    <label class="fake btn2" style="display:flex;align-items:center;justify-content:center;text-align:center">1. Importer le fichier noyau<input id="excelInput" type="file" accept=".xlsx,.xls" class="hidden"></label>
    <label class="fake btn" style="display:flex;align-items:center;justify-content:center;text-align:center">2. Importer les JSON de séance<input id="jsonInput" type="file" accept="application/json" multiple class="hidden"></label>
    <button class="btnG" onclick="exportSyntheseJson()">⬇ Export synthèse JSON</button>
    <button class="btnX" onclick="window.print()">Imprimer / PDF</button>
  </div>

  <section class="panel barTop">
    <div class="row">
      <div><strong>Classe :</strong> <span id="activeClassLabel">aucune</span></div>
      <select id="classSelect"></select>
      <input id="searchInput" class="grow" type="search" placeholder="Rechercher un élève...">
      <select id="focusSelect">
        <option value="global">Vue globale</option>
        <option value="difficultes">Priorité difficultés</option>
        <option value="progres">Priorité progrès</option>
        <option value="incidents">Priorité incidents / absences</option>
      </select>
    </div>
    <div class="legend">
      <span class="pill" style="background:var(--gris)">Gris : peu ou pas observé</span>
      <span class="pill" style="background:var(--noir);color:white">Noir</span>
      <span class="pill" style="background:var(--rouge);color:white">Rouge</span>
      <span class="pill" style="background:var(--jaune)">Jaune</span>
      <span class="pill" style="background:var(--vert);color:white">Vert</span>
      <span class="pill" style="background:var(--bleu);color:white">Bleu</span>
    </div>
    <div class="small muted" id="statusText" style="margin-top:8px">Importe le noyau puis les exports JSON de l’app suivi terrain.</div>
  </section>

  <section class="panel">
    <div class="dash" id="dashMount"></div>
  </section>

  <section class="mainGrid">
    <aside class="panel noPrint">
      <h2 style="margin-top:0">Élèves</h2>
      <div id="studentList" class="studentList"></div>
    </aside>
    <main class="panel">
      <div id="detailMount"></div>
    </main>
  </section>
</div>
<script>
const STORAGE_KEY='synthese_eleves_v1';
const LEVELS=['gris','noir','rouge','jaune','vert','bleu'];
const LEVEL_SCORE={gris:0,noir:0,rouge:1,jaune:2,vert:3,bleu:4};
const COLORS={gris:'#94a3b8',noir:'#111827',rouge:'#dc2626',jaune:'#facc15',vert:'#16a34a',bleu:'#2563eb'};
const DEFAULT_SKILLS=[{id:'global',label:'Positionnement général'},{id:'creer',label:'Créer / réaliser'},{id:'reflechir',label:'Questionner / réfléchir'},{id:'mettre_oeuvre',label:'Mettre en œuvre'},{id:'expliquer',label:'Expliquer'},{id:'connaitre',label:'Connaître'}];
let state=load()||{classes:{},activeClass:null,skills:DEFAULT_SKILLS,sessions:[],selectedStudent:null,lastImportName:''};
function norm(v){return String(v??'').trim()}
function normalizeKey(s){return norm(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function uid(){return Math.random().toString(36).slice(2,10)}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')}catch(e){return null}}
function safeFileName(s){return String(s||'classe').trim().replace(/[^a-zA-Z0-9_-]+/g,'_').replace(/^_+|_+$/g,'')||'classe'}
function nameKey(s){return normalizeKey(s).replace(/[^a-z0-9_]/g,'')}
function tableLabel(v){let t=norm(v); if(!t)return'Non placés'; let m=t.match(/^(?:table\s*)?t?\s*(\d+)$/i); return m?'Table '+m[1]:t}
function makeStudent(o){let name=norm(o.nom_complet||o.nomComplet||[o.nom,o.prenom].filter(Boolean).join(' ')); return {id:uid(),name:name||'Élève',table:tableLabel(o.table),groupe:norm(o.groupe),ebep:norm(o.ebep),precisions:norm(o.precisions)}}
function parseWorkbook(wb,fileName){let ws=wb.Sheets['Eleves']||wb.Sheets['Élèves']; if(!ws)throw new Error('Onglet Eleves introuvable'); let rows=XLSX.utils.sheet_to_json(ws,{defval:''}); let classes={}; rows.forEach(row=>{let o={}; Object.keys(row).forEach(k=>o[normalizeKey(k)]=row[k]); let active=norm(o.actif||o.active||'oui').toLowerCase(); if(['non','no','0'].includes(active))return; let classe=norm(o.classe); if(!classe)return; if(!classes[classe])classes[classe]={name:classe,students:[]}; let s=makeStudent(o); if(s.name&&s.name!=='Élève')classes[classe].students.push(s)}); if(!Object.keys(classes).length)throw new Error('Aucune classe trouvée dans Eleves'); Object.keys(classes).forEach(k=>state.classes[k]=classes[k]); state.lastImportName=fileName||''; if(!state.activeClass)state.activeClass=Object.keys(classes)[0]; if(!state.selectedStudent&&state.classes[state.activeClass]?.students[0])state.selectedStudent=state.classes[state.activeClass].students[0].name}
function importSession(data,fileName){if(data.app!=='suivi_terrain_simple')throw new Error(fileName+' : fichier non reconnu'); let s=data.state||{}; let clsName=data.classe||s.activeClass; let cls=s.classes?.[clsName]; if(!cls)throw new Error(fileName+' : classe introuvable dans le JSON'); let exportedAt=data.exportedAt||new Date().toISOString(); let session={id:uid(),fileName,classe:clsName,exportedAt,skills:s.skills||DEFAULT_SKILLS,students:[]}; cls.students.forEach(st=>session.students.push({name:st.name,table:st.table||'',ebep:st.ebep||'',precisions:st.precisions||'',absent:!!st.absent,incident:st.incident||0,travail:!!st.travail,reflexion:!!st.reflexion,evals:st.evals||{}})); state.sessions=state.sessions.filter(x=>!(x.fileName===fileName&&x.classe===clsName)); state.sessions.push(session); if(!state.activeClass)state.activeClass=clsName; let skillMap=new Map(state.skills.map(x=>[x.id,x])); session.skills.forEach(sk=>{if(!skillMap.has(sk.id)){state.skills.push(sk);skillMap.set(sk.id,sk)}})}
document.getElementById('excelInput').addEventListener('change',async e=>{let file=e.target.files[0]; if(!file)return; try{let wb=XLSX.read(await file.arrayBuffer(),{type:'array'}); parseWorkbook(wb,file.name); save(); render(); alert('Noyau importé.')}catch(err){alert('Import impossible : '+err.message)} e.target.value=''});
document.getElementById('jsonInput').addEventListener('change',async e=>{let files=[...e.target.files]; if(!files.length)return; let ok=0,errors=[]; for(const file of files){try{importSession(JSON.parse(await file.text()),file.name);ok++}catch(err){errors.push(err.message)}} save(); render(); alert(ok+' JSON importé(s).'+(errors.length?'\n\nErreurs :\n'+errors.join('\n'):'')); e.target.value=''});
document.getElementById('classSelect').addEventListener('change',e=>{state.activeClass=e.target.value; state.selectedStudent=null; save(); render()});
document.getElementById('searchInput').addEventListener('input',render);
document.getElementById('focusSelect').addEventListener('change',render);
function activeClass(){return state.classes[state.activeClass]||null}
function activeSessions(){return state.sessions.filter(s=>s.classe===state.activeClass).sort((a,b)=>String(a.exportedAt).localeCompare(String(b.exportedAt)))}
function baseStudents(){let cls=activeClass(); if(cls)return cls.students; let names=new Map(); activeSessions().forEach(se=>se.students.forEach(st=>names.set(nameKey(st.name),{name:st.name,table:st.table,ebep:st.ebep,precisions:st.precisions}))); return [...names.values()]}
function synthForStudent(st){let sessions=activeSessions(); let key=nameKey(st.name); let recs=[]; sessions.forEach(se=>{let r=se.students.find(x=>nameKey(x.name)===key); if(r)recs.push({...r,sessionId:se.id,date:se.exportedAt,fileName:se.fileName})}); let totals={observations:recs.length,absences:0,incidents:0,travail:0,reflexion:0,evalCount:0,scoreSum:0,bySkill:{}}; recs.forEach(r=>{if(r.absent)totals.absences++; totals.incidents+=Number(r.incident||0); if(r.travail)totals.travail++; if(r.reflexion)totals.reflexion++; Object.entries(r.evals||{}).forEach(([skill,lvl])=>{if(!lvl||lvl==='gris')return; let sc=LEVEL_SCORE[lvl]??0; totals.evalCount++; totals.scoreSum+=sc; if(!totals.bySkill[skill])totals.bySkill[skill]={count:0,sum:0,last:lvl,values:[]}; totals.bySkill[skill].count++; totals.bySkill[skill].sum+=sc; totals.bySkill[skill].last=lvl; totals.bySkill[skill].values.push({lvl,score:sc,date:r.date})})}); totals.avg=totals.evalCount?totals.scoreSum/totals.evalCount:0; totals.level=scoreToLevel(totals.avg,totals.evalCount); totals.trend=trend(totals); totals.alerts=alerts(totals); totals.recs=recs; return totals}
function scoreToLevel(avg,count){if(!count)return'gris'; if(avg<.5)return'noir'; if(avg<1.5)return'rouge'; if(avg<2.5)return'jaune'; if(avg<3.5)return'vert'; return'bleu'}
function trend(t){let vals=[]; Object.values(t.bySkill).forEach(sk=>sk.values.forEach(v=>vals.push(v.score))); if(vals.length<2)return'non stabilisée'; let first=vals.slice(0,Math.ceil(vals.length/2)).reduce((a,b)=>a+b,0)/Math.ceil(vals.length/2); let second=vals.slice(Math.ceil(vals.length/2)).reduce((a,b)=>a+b,0)/Math.max(1,vals.length-Math.ceil(vals.length/2)); if(second-first>.5)return'en progrès'; if(first-second>.5)return'en baisse'; return'assez stable'}
function alerts(t){let a=[]; if(t.absences>=2)a.push('absences répétées'); if(t.incidents>=2)a.push('incidents à surveiller'); if(t.evalCount===0)a.push('peu observé'); if(t.level==='rouge'||t.level==='noir')a.push('fragilité visible'); if(t.trend==='en progrès')a.push('progrès repérable'); return a}
function skillLabel(id){return (state.skills.find(s=>s.id===id)||{}).label||id}
function sortedStudents(){let q=normalizeKey(document.getElementById('searchInput').value); let focus=document.getElementById('focusSelect').value; let arr=baseStudents().map(st=>({st,s:synthForStudent(st)})).filter(x=>!q||normalizeKey(x.st.name).includes(q)); if(focus==='difficultes')arr.sort((a,b)=>(a.s.avg-b.s.avg)||(b.s.incidents-a.s.incidents)); else if(focus==='progres')arr.sort((a,b)=>Number(b.s.trend==='en progrès')-Number(a.s.trend==='en progrès')||b.s.avg-a.s.avg); else if(focus==='incidents')arr.sort((a,b)=>(b.s.incidents+b.s.absences)-(a.s.incidents+a.s.absences)); else arr.sort((a,b)=>a.st.name.localeCompare(b.st.name,'fr')); return arr}
function renderClassSelect(){let sel=document.getElementById('classSelect'); let names=[...new Set([...Object.keys(state.classes),...state.sessions.map(s=>s.classe)])].sort((a,b)=>a.localeCompare(b,'fr',{numeric:true})); sel.innerHTML=names.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join(''); if(!state.activeClass&&names[0])state.activeClass=names[0]; sel.value=state.activeClass||''}
function renderDash(){let students=baseStudents(); let synths=students.map(synthForStudent); let sessions=activeSessions(); let observed=synths.filter(s=>s.evalCount>0).length; let fragile=synths.filter(s=>['noir','rouge'].includes(s.level)).length; let incidents=synths.reduce((a,b)=>a+b.incidents,0); document.getElementById('dashMount').innerHTML=`<div class="kpi"><div class="muted small">Séances importées</div><strong>${sessions.length}</strong></div><div class="kpi"><div class="muted small">Élèves</div><strong>${students.length}</strong></div><div class="kpi"><div class="muted small">Élèves observés</div><strong>${observed}</strong></div><div class="kpi ${fragile?'warn':''}"><div class="muted small">Fragilités visibles</div><strong>${fragile}</strong></div><div class="kpi ${incidents?'bad':''}"><div class="muted small">Incidents cumulés</div><strong>${incidents}</strong></div>`}
function renderList(){let arr=sortedStudents(); if(!state.selectedStudent&&arr[0])state.selectedStudent=arr[0].st.name; document.getElementById('studentList').innerHTML=arr.length?arr.map(({st,s})=>`<button class="studentBtn ${state.selectedStudent===st.name?'active':''}" onclick="state.selectedStudent='${esc(st.name)}';save();render()"><div><div class="name">${esc(st.name)}</div><div class="meta">${esc(st.table||'')} ${st.ebep?' · '+esc(st.ebep):''}<br>${s.evalCount} observation(s) · ${esc(s.trend)}</div></div><span class="dot" style="background:${COLORS[s.level]}"></span></button>`).join(''):'<p class="muted">Aucun élève.</p>'}
function phrase(st,s){let p=[]; if(s.evalCount===0)p.push(`${st.name} n’a pas encore été suffisamment observé dans les suivis importés.`); else p.push(`${st.name} présente un positionnement ${levelText(s.level)} sur l’ensemble des observations importées.`); if(s.trend==='en progrès')p.push('La tendance montre un progrès repérable.'); if(s.trend==='en baisse')p.push('La tendance demande une vigilance, car certains indicateurs baissent.'); if(s.incidents)p.push(`On relève ${s.incidents} incident(s) dans les séances importées.`); if(s.absences)p.push(`Il y a ${s.absences} absence(s) notée(s).`); if(s.travail)p.push('Des moments de mise au travail ont été repérés.'); if(s.reflexion)p.push('Des moments de réflexion ou de recherche ont été repérés.'); return p.join(' ')}
function levelText(l){return {gris:'encore peu renseigné',noir:'non évaluable ou très fragile',rouge:'fragile',jaune:'en construction',vert:'satisfaisant',bleu:'très solide'}[l]||l}
function renderDetail(){let st=baseStudents().find(x=>x.name===state.selectedStudent)||baseStudents()[0]; let mount=document.getElementById('detailMount'); if(!st){mount.innerHTML='<h2>Aucune donnée</h2><p class="muted">Importe le noyau ou des JSON de séance.</p>';return} let s=synthForStudent(st); let skillRows=Object.entries(s.bySkill).sort((a,b)=>skillLabel(a[0]).localeCompare(skillLabel(b[0]),'fr')).map(([id,v])=>{let avg=v.sum/v.count; let lvl=scoreToLevel(avg,v.count); return `<tr><td>${esc(skillLabel(id))}</td><td><span class="levelChip"><span class="dot" style="background:${COLORS[lvl]};width:12px;height:12px"></span>${esc(levelText(lvl))}</span></td><td>${v.count}</td><td>${esc(v.last)}</td></tr>`}).join(''); let width=Math.round((s.avg/4)*100); mount.innerHTML=`<div class="printOnly"><h1>Fiche synthèse élève</h1></div><div class="row" style="justify-content:space-between"><div><h2 style="margin:0">${esc(st.name)}</h2><div class="muted">${esc(st.table||'')} ${st.ebep?' · '+esc(st.ebep):''} ${st.precisions?' · '+esc(st.precisions):''}</div></div><span class="levelChip"><span class="dot" style="background:${COLORS[s.level]}"></span>${esc(levelText(s.level))}</span></div><div class="cards" style="margin-top:12px"><div class="card"><div class="muted small">Observations</div><strong style="font-size:24px">${s.evalCount}</strong></div><div class="card"><div class="muted small">Tendance</div><strong>${esc(s.trend)}</strong></div><div class="card ${s.incidents?'bad':''}"><div class="muted small">Incidents</div><strong style="font-size:24px">${s.incidents}</strong></div><div class="card ${s.absences?'warn':''}"><div class="muted small">Absences</div><strong style="font-size:24px">${s.absences}</strong></div></div><div class="card" style="margin-top:10px"><div class="barLine"><strong>Moyenne visuelle</strong><div class="barTrack"><div class="barFill" style="width:${width}%;background:${COLORS[s.level]}"></div></div><span>${s.evalCount?Number(s.avg).toFixed(1):'-'}/4</span></div></div><h3>Lecture rapide</h3><div class="textBox">${esc(phrase(st,s))}</div><h3>Par compétence</h3><table class="table"><thead><tr><th>Compétence</th><th>Synthèse</th><th>Nb.</th><th>Dernier niveau</th></tr></thead><tbody>${skillRows||'<tr><td colspan="4" class="muted">Aucune compétence observée.</td></tr>'}</tbody></table><h3>Repères de séance</h3><table class="table"><thead><tr><th>Date</th><th>Travail</th><th>Réflexion</th><th>Abs.</th><th>Inc.</th></tr></thead><tbody>${s.recs.map(r=>`<tr><td>${esc(new Date(r.date).toLocaleString('fr-FR'))}</td><td>${r.travail?'oui':'-'}</td><td>${r.reflexion?'oui':'-'}</td><td>${r.absent?'oui':'-'}</td><td>${r.incident||'-'}</td></tr>`).join('')||'<tr><td colspan="5" class="muted">Aucun repère.</td></tr>'}</tbody></table>`}
function render(){renderClassSelect(); document.getElementById('activeClassLabel').textContent=state.activeClass||'aucune'; renderDash(); renderList(); renderDetail(); let sessions=activeSessions().length; let total=baseStudents().length; document.getElementById('statusText').textContent=state.activeClass?`${state.activeClass} · ${total} élèves · ${sessions} séance(s) importée(s) · noyau : ${state.lastImportName||'non renseigné'}`:'Importe le noyau puis les exports JSON de l’app suivi terrain.'; save()}
function exportSyntheseJson(){let classe=state.activeClass||''; let students=baseStudents().map(st=>({student:st,synthese:synthForStudent(st)})); let data={app:'synthese_eleves',version:'v1',classe,exportedAt:new Date().toISOString(),students}; let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='synthese_'+safeFileName(classe)+'_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(a.href)}
render();
</script>
</body>
</html>
